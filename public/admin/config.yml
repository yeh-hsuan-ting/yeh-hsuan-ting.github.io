# Sveltia CMS configuration.
# Docs: https://sveltiacms.app/en/docs/

backend:
  name: github
  repo: yeh-hsuan-ting/yeh-hsuan-ting.github.io
  branch: cms # CMS commits land here, NOT main — so saving never deploys.
  # Auth: "Sign in with Token" (a GitHub PAT). No OAuth App / Worker needed.
  # To switch to the OAuth login flow later, deploy sveltia-cms-auth and add:
  #   base_url: https://<your-worker>.workers.dev

# Uploaded media is committed to the repo under public/uploads
# and served at /uploads/<file> on the live site.
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: src/content/posts
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: yaml-frontmatter
    # Fields map 1:1 to the zod schema in src/content.config.ts
    fields:
      - { name: title, label: Title, widget: string }
      - {
          name: pubDate,
          label: Pub date,
          widget: datetime,
          picker_utc: false,
          format: "yyyy-MM-dd'T'HH:mm:ssXXX",
        }
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: true }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: Body, widget: markdown }
